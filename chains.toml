# Named chain definitions for preset composition.
# Each chain runs its presets in sequence with isolated state per step.
# Preset names resolve to presets/<name>/ directories.

# Budget constraints for dynamic chain generation.
# These limits apply to all chains spawned at runtime.
[budget]
max_depth = 5
max_steps = 50
max_runtime_ms = 3600000
max_children = 10
max_consecutive_failures = 3

[[chain]]
name = "code-and-qa"
steps = ["autocode", "autoqa"]

[[chain]]
name = "code-simplify-qa"
steps = ["autocode", "autosimplify", "autoqa"]

[[chain]]
name = "code-test-fix"
steps = ["autocode", "autotest", "autofix"]

[[chain]]
name = "full-cycle"
steps = ["autocode", "autoqa", "autoresearch", "autocode"]

[[chain]]
name = "security-hardening"
steps = ["autosec", "autofix", "autotest"]

[[chain]]
name = "doc-review"
steps = ["autodoc", "autoreview"]
