# Autoloop kanban tmux config — tailored for web-terminal usage
# Applied via: tmux -L autoloop-kanban -f <this-file> ...
# Loaded only by dashboard-spawned sessions; user's ~/.tmux.conf is ignored
# so there's no prefix/binding conflict with their regular tmux usage.

# No prefix key — browser UI + autoloop own shortcuts, tmux shouldn't steal keys.
# Setting prefix=None makes the prefix table unreachable; no need to unbind it.
set -g prefix  None

# No status bar — the browser UI already shows the task title.
# Gives autoloop one extra row of terminal real estate.
set -g status off

# Mouse ON so wheel scrolls. autoloop runs under alt-screen-capable renderers, so ghostty-
# web's native scrollback is empty — only tmux's scrollback has the history.
# With mouse off, wheel sends arrow keys to autoloop (useless). With mouse on +
# the WheelUpPane binding below, wheel enters tmux copy-mode where PageUp/
# PageDown/Home/End and q-to-exit work. The binding uses send-keys -M in
# copy-mode so subsequent wheel ticks scroll within copy-mode.
set -g mouse   on

# Wheel-up enters copy-mode + scrolls; wheel-down in copy-mode scrolls; outside
# copy-mode wheel-down is a no-op (can't scroll below live output).
bind -T root WheelUpPane if-shell -F -t = "#{pane_in_mode}" "send-keys -M" "copy-mode -e ; send-keys -M"
bind -T root WheelDownPane if-shell -F -t = "#{pane_in_mode}" "send-keys -M" ""

# In copy-mode, make navigation feel modern (vi-ish + q quits).
setw -g mode-keys vi
bind -T copy-mode-vi q send-keys -X cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# Faster key response — no escape-key delay.
set -s escape-time 0

# Wider scrollback for autoloop sessions.
set -g history-limit 50000

# Terminal capability — autoloop uses 256 colors + truecolor sequences.
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Aggressive resize: when multiple clients attach, size to largest visible.
# Avoids shrinking autoloop to 80x24 if any detached client is that size.
set -gw aggressive-resize on

# Don't keep dead panes around — when the wrapper shell exits, close the pane.
set -g remain-on-exit off

# Hide bell/visual bell — autoloop doesn't use audible bell.
set -g bell-action    none
set -g visual-bell    off
