name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read tonic version
        id: tonic-version
        run: echo "version=$(< .tonic-version)" >> "$GITHUB_OUTPUT"

      - name: Install tonic
        run: cargo install tonic-lang --version "${{ steps.tonic-version.outputs.version }}"

      - name: Check syntax
        run: tonic check .

      - name: Run tests
        run: ./bin/test

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runs_on: ubuntu-latest
          - platform: macos-arm64
            runs_on: macos-14
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4

      - name: Read tonic version
        id: tonic-version
        run: echo "version=$(< .tonic-version)" >> "$GITHUB_OUTPUT"

      - name: Install tonic
        run: cargo install tonic-lang --version "${{ steps.tonic-version.outputs.version }}"

      - name: Build compiled binary
        run: ./scripts/build-release.sh "dist/miniloops"

      - name: Smoke test compiled binary
        run: ./scripts/release-smoke.sh "dist/miniloops"

      - name: Package release archive
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_PLATFORM: ${{ matrix.platform }}
        run: ./scripts/package-release.sh "dist/miniloops" "$RELEASE_TAG" "$RELEASE_PLATFORM" dist

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-release
          path: dist/miniloops-${{ github.ref_name }}-${{ matrix.platform }}.tar.gz
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten release files
        run: |
          mkdir -p release-dist
          find dist -type f -name '*.tar.gz' -exec cp {} release-dist/ \;
          test -f "release-dist/miniloops-${RELEASE_TAG}-linux-x64.tar.gz"
          test -f "release-dist/miniloops-${RELEASE_TAG}-macos-arm64.tar.gz"

      - name: Generate checksums
        run: |
          cd release-dist
          shasum -a 256 *.tar.gz > SHA256SUMS.txt

      - name: Create or update GitHub release
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "release already exists: $RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
          fi
          gh release upload "$RELEASE_TAG" release-dist/* --clobber
