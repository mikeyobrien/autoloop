name: publish-npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  # contents: write is needed to create the GitHub release after publish.
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build (workspaces + root)
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify tag matches root package version
        if: github.event_name == 'push'
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Verify all workspaces are on the same version
        if: github.event_name == 'push'
        run: |
          ROOT_VERSION=$(node -p "require('./package.json').version")
          node --input-type=module -e "
            import { readdirSync, readFileSync, statSync } from 'node:fs';
            import { join } from 'node:path';
            const root = '${GITHUB_WORKSPACE}';
            const target = '${ROOT_VERSION}';
            const pkgDir = join(root, 'packages');
            for (const name of readdirSync(pkgDir)) {
              const full = join(pkgDir, name, 'package.json');
              try { statSync(full); } catch { continue; }
              const v = JSON.parse(readFileSync(full, 'utf-8')).version;
              if (v !== target) {
                console.error('packages/' + name + ' version ' + v + ' != root ' + target);
                process.exit(1);
              }
            }
            console.log('all workspaces aligned on ' + target);
          "

      - name: Publish workspace packages to npm
        # Publishes the root package's transitive public workspace deps first
        # so the root package resolves pinned cross-workspace deps from the
        # registry. We loop per-workspace so that "already published at this
        # version" is a clean skip, while any other failure aborts loudly.
        # `--ignore-scripts` prevents workspace lifecycle hooks from
        # re-triggering.
        #
        # `--provenance` requires trusted publishing to be configured on
        # npmjs.org for every published workspace package. Packages that are
        # not in the root install graph (for example optional sync adapters)
        # are intentionally not included here until their npm trusted
        # publishing records are configured.
        run: |
          set -euo pipefail
          node --input-type=module -e "
            import { readFileSync } from 'node:fs';
            import { join } from 'node:path';
            const releasePackages = [
              'backends',
              'core',
              'dashboard',
              'kanban',
              'presets',
              'harness',
              'cli',
            ];
            const root = process.cwd();
            const out = [];
            for (const dirName of releasePackages) {
              const dir = join('packages', dirName);
              const full = join(root, dir, 'package.json');
              const pkg = JSON.parse(readFileSync(full, 'utf-8'));
              if (pkg.private) continue;
              out.push(JSON.stringify({ dir, name: pkg.name, version: pkg.version }));
            }
            console.log(out.join('\n'));
          " > /tmp/workspaces.jsonl

          while IFS= read -r line; do
            DIR=$(node -p "JSON.parse(process.argv[1]).dir" "$line")
            NAME=$(node -p "JSON.parse(process.argv[1]).name" "$line")
            VERSION=$(node -p "JSON.parse(process.argv[1]).version" "$line")

            if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
              echo "skip: $NAME@$VERSION already published"
              continue
            fi

            echo "publish: $NAME@$VERSION"
            npm publish --access public --provenance --ignore-scripts -w "$DIR"
          done < /tmp/workspaces.jsonl

      - name: Verify workspace deps resolve at the new version
        # Belt-and-suspenders guard: before we publish the root package
        # (which pins cross-workspace deps to this exact version), confirm
        # every workspace dep the root depends on is actually fetchable at
        # that version on the registry. Catches silent skips above.
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          ROOT_VERSION=$(node -p "require('./package.json').version")
          node --input-type=module -e "
            import { readFileSync } from 'node:fs';
            const pkg = JSON.parse(readFileSync('./package.json', 'utf-8'));
            const deps = { ...(pkg.dependencies ?? {}) };
            const target = '${ROOT_VERSION}';
            const owned = Object.keys(deps).filter(n => n.startsWith('@mobrienv/autoloop'));
            console.log(owned.join('\n'));
          " > /tmp/workspace-deps.txt

          # The registry index lags the publish by a few seconds, so a dep
          # published moments ago can 404 here (this aborted the v0.8.0 run).
          # Retry with backoff before declaring a dep unresolvable.
          while IFS= read -r dep; do
            [ -z "$dep" ] && continue
            resolvable=false
            for attempt in 1 2 3 4 5 6; do
              if npm view "$dep@$ROOT_VERSION" version >/dev/null 2>&1; then
                resolvable=true
                break
              fi
              echo "wait: $dep@$ROOT_VERSION not indexed yet (attempt $attempt/6), retrying in 10s"
              sleep 10
            done
            if [ "$resolvable" != "true" ]; then
              echo "::error::Workspace dep $dep@$ROOT_VERSION is not resolvable on the registry. Aborting before root publish."
              exit 1
            fi
            echo "ok: $dep@$ROOT_VERSION resolvable"
          done < /tmp/workspace-deps.txt

      - name: Check whether root version is already published
        id: npm_version
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published; skipping root publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is not published yet; continuing."
          fi

      - name: Publish root package to npm
        if: steps.npm_version.outputs.already_published != 'true'
        run: npm publish --access public --provenance

      - name: Publish summary
        if: steps.npm_version.outputs.already_published == 'true'
        run: echo "Root publish skipped because this version is already on npm."

      - name: Create GitHub release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="$GITHUB_REF_NAME"
          VERSION="${TAG#v}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists; skipping"
            exit 0
          fi
          # Pull this version's section out of CHANGELOG.md for the notes.
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found = 1; next }
            /^## \[/ && found { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ -s /tmp/release-notes.md ]; then
            gh release create "$TAG" --title "$TAG" --notes-file /tmp/release-notes.md
          else
            echo "no CHANGELOG section for $VERSION; falling back to generated notes"
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
