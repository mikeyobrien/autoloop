name: publish-npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build (workspaces + root)
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify tag matches root package version
        if: github.event_name == 'push'
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Verify all workspaces are on the same version
        if: github.event_name == 'push'
        run: |
          ROOT_VERSION=$(node -p "require('./package.json').version")
          node --input-type=module -e "
            import { readdirSync, readFileSync, statSync } from 'node:fs';
            import { join } from 'node:path';
            const root = '${GITHUB_WORKSPACE}';
            const target = '${ROOT_VERSION}';
            const pkgDir = join(root, 'packages');
            for (const name of readdirSync(pkgDir)) {
              const full = join(pkgDir, name, 'package.json');
              try { statSync(full); } catch { continue; }
              const v = JSON.parse(readFileSync(full, 'utf-8')).version;
              if (v !== target) {
                console.error('packages/' + name + ' version ' + v + ' != root ' + target);
                process.exit(1);
              }
            }
            console.log('all workspaces aligned on ' + target);
          "

      - name: Publish workspace packages to npm
        # Publishes packages/* first so the root package resolves pinned
        # cross-workspace deps from the registry. `--ignore-scripts`
        # prevents workspace lifecycle hooks from re-triggering.
        run: npm publish --workspaces --access public --provenance --ignore-scripts || true
        # `|| true` keeps a partially-failed publish non-fatal for idempotent
        # re-runs — individual workspaces that are already on npm simply
        # 409 and are skipped. The final root-publish step below will
        # still fail loudly if it can't resolve a freshly-required dep.

      - name: Check whether root version is already published
        id: npm_version
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published; skipping root publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is not published yet; continuing."
          fi

      - name: Publish root package to npm
        if: steps.npm_version.outputs.already_published != 'true'
        run: npm publish --access public --provenance

      - name: Publish summary
        if: steps.npm_version.outputs.already_published == 'true'
        run: echo "Root publish skipped because this version is already on npm."
