name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read tonic version
        id: tonic-version
        run: echo "version=$(cat .tonic-version)" >> "$GITHUB_OUTPUT"

      - name: Install tonic
        run: cargo install tonic-lang --version "${{ steps.tonic-version.outputs.version }}"

      - name: Check syntax
        run: tonic check .

      - name: Run tests
        run: bin/test

  pi-smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read tonic version
        id: tonic-version
        run: echo "version=$(cat .tonic-version)" >> "$GITHUB_OUTPUT"

      - name: Install tonic
        run: cargo install tonic-lang --version "${{ steps.tonic-version.outputs.version }}"

      - name: Run pi-smoke
        run: scripts/pi-smoke.sh
