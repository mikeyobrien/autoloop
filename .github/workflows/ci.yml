name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tonic
        run: ./scripts/install-tonic.sh

      - name: Check syntax
        run: tonic check .

      - name: Run tests
        run: bin/test

  pi-smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tonic
        run: ./scripts/install-tonic.sh

      - name: Run pi-smoke
        run: scripts/pi-smoke.sh
